<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABFT Blocky Nose Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .calculator-card {
            background-color: #24242b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            margin-top: 0;
            color: #ffaa00;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #a1a1aa;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #3f3f46;
            border-radius: 6px;
            background-color: #18181b;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #ffaa00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffaa00;
            border: none;
            border-radius: 6px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #e09600;
        }
        .results {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #3f3f46;
        }
        .step-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }
        .step-item {
            background-color: #18181b;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #ffaa00;
            font-family: monospace;
            font-size: 14px;
        }
        .highlight {
            color: #ffaa00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>BABFT Blocky Nose Calc</h2>
    
    <div class="input-group">
        <label for="width">Cabin Width (studs):</label>
        <input type="number" id="width" placeholder="e.g., 12" value="12">
    </div>
    
    <div class="input-group">
        <label for="height">Cabin Height (studs):</label>
        <input type="number" id="height" placeholder="e.g., 8" value="8">
    </div>
    
    <div class="input-group">
        <label for="stepDown">Size Drop per Step (studs):</label>
        <input type="number" id="stepDown" placeholder="e.g., 2" value="2" step="0.5">
    </div>
    
    <button onclick="calculateBlockyNose()">Generate Block Steps</button>
    
    <div class="results" id="results" style="display: none;">
        <h3>Your Building Blueprint:</h3>
        <ul class="step-list" id="stepList"></ul>
        <p style="font-size: 12px; color: #71717a; margin-top: 15px;">
            *Center each new segment inside the previous one to keep the nose perfectly straight!
        </p>
    </div>
</div>

<script>
function calculateBlockyNose() {
    const width = parseFloat(document.getElementById('width').value);
    const height = parseFloat(document.getElementById('height').value);
    const stepDown = parseFloat(document.getElementById('stepDown').value);
    const stepList = document.getElementById('stepList');
    
    if (isNaN(width) || isNaN(height) || isNaN(stepDown) || stepDown <= 0) {
        alert("Please enter valid numbers!");
        return;
    }
    
    // Clear previous results
    stepList.innerHTML = '';
    
    let currentWidth = width;
    let currentHeight = height;
    let stepCount = 1;
    
    // Loop until width or height gets too small to step down further
    while (currentWidth > 0 && currentHeight > 0) {
        const li = document.createElement('li');
        li.className = 'step-item';
        li.innerHTML = `Segment ${stepCount}: <span class="highlight">W: ${currentWidth.toFixed(1)}</span> x <span class="highlight">H: ${currentHeight.toFixed(1)}</span>`;
        stepList.appendChild(li);
        
        currentWidth -= stepDown;
        currentHeight -= stepDown;
        stepCount++;
    }
    
    document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
