<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABFT Circular Nose Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .calculator-card {
            background-color: #24242b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
        }
        h2 {
            margin-top: 0;
            color: #ffaa00;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-group {
            flex: 1;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #a1a1aa;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #3f3f46;
            border-radius: 6px;
            background-color: #18181b;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #ffaa00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffaa00;
            border: none;
            border-radius: 6px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #e09600;
        }
        .results {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #3f3f46;
        }
        .diagram-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }
        .layer-box {
            background-color: #18181b;
            padding: 15px;
            border-radius: 6px;
            border-left: 5px solid #ffaa00;
        }
        .layer-title {
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .layer-details {
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }
        /* Grid styling for the blocks */
        .circle-grid {
            display: grid;
            background: #111;
            padding: 10px;
            border-radius: 6px;
            justify-content: center;
            align-content: center;
            margin: 0 auto;
            width: max-content;
        }
        .grid-block {
            width: 16px;
            height: 16px;
            background-color: #ffaa00;
            border: 1px solid #1a1a1a; /* Distinct dark outline between blocks */
            box-sizing: border-box;
        }
        .grid-empty {
            width: 16px;
            height: 16px;
            background-color: transparent;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>BABFT Round Nose Calculator</h2>
    
    <div class="input-row">
        <div class="input-group">
            <label for="width">Cabin Width (studs):</label>
            <input type="number" id="width" value="12">
        </div>
        
        <div class="input-group">
            <label for="height">Cabin Height (studs):</label>
            <input type="number" id="height" value="12">
        </div>
    </div>
    
    <div class="input-group">
        <label for="extendBlocks">Extend Length (Blocks long):</label>
        <input type="number" id="extendBlocks" value="6">
    </div>
    
    <button onclick="generateCircularBlueprint()">Generate Circular Blueprint</button>
    
    <div class="results" id="results" style="display: none;">
        <h3>Building Diagram (Layer-by-Layer):</h3>
        <div class="diagram-container" id="diagramContainer"></div>
    </div>
</div>

<script>
function generateCircularBlueprint() {
    const width = parseFloat(document.getElementById('width').value);
    const height = parseFloat(document.getElementById('height').value);
    const totalLayers = parseInt(document.getElementById('extendBlocks').value);
    const container = document.getElementById('diagramContainer');
    
    if (isNaN(width) || isNaN(height) || isNaN(totalLayers) || totalLayers <= 0) {
        alert("Please enter valid positive numbers!");
        return;
    }
    
    container.innerHTML = '';
    
    const widthStep = width / totalLayers;
    const heightStep = height / totalLayers;
    
    for (let i = 0; i < totalLayers; i++) {
        let layerWidth = Math.max(1, width - (widthStep * i));
        let layerHeight = Math.max(1, height - (heightStep * i));
        
        const layerDiv = document.createElement('div');
        layerDiv.className = 'layer-box';
        
        // Round to whole block grids for visual rendering
        let cols = Math.round(layerWidth);
        let rows = Math.round(layerHeight);
        
        // Ensure odd/even sizing logic matches cleanly
        if (cols < 1) cols = 1;
        if (rows < 1) rows = 1;
        
        const gridContainer = document.createElement('div');
        gridContainer.className = 'circle-grid';
        gridContainer.style.gridTemplateColumns = `repeat(${cols}, 16px)`;
        
        // Mathematical circle/ellipse rendering loop
        const rx = cols / 2;
        const ry = rows / 2;
        
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                // Normalize coordinates relative to the center of the shape
                const dx = (x + 0.5) - rx;
                const dy = (y + 0.5) - ry;
                
                // Ellipse equation: (x^2 / rx^2) + (y^2 / ry^2) <= 1
                // We add a slight buffer tolerance (0.1) to make circles look full and blocky
                if ((dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1.1) {
                    const block = document.createElement('div');
                    block.className = 'grid-block';
                    gridContainer.appendChild(block);
                } else {
                    const empty = document.createElement('div');
                    empty.className = 'grid-empty';
                    gridContainer.appendChild(empty);
                }
            }
        }

        layerDiv.innerHTML = `
            <div class="layer-title">BLOCK LAYER ${i + 1} (Going Outward)</div>
            <div class="layer-details">Outer Bounds: <strong>${layerWidth.toFixed(2)}w</strong> x <strong>${layerHeight.toFixed(2)}h</strong></div>
        `;
        layerDiv.appendChild(gridContainer);
        container.appendChild(layerDiv);
    }
    
    document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
